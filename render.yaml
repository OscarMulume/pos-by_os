# ═══════════════════════════════════════════════════════════
# Render.com Blueprint — POS Pro v1.3
# ═══════════════════════════════════════════════════════════

services:
  - type: web
    name: pos-pro-msec
    runtime: docker
    plan: free
    region: ohio
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_URL
        value: https://pos-pro-msec.onrender.com
      - key: APP_KEY
        value: base64:9aGhanrb73GJt9e0KLHEMKnQbvNSmpzoXUmJhcSLar8=
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stderr
